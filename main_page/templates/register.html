{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{% static 'css/style.css'%}" type="text/css">

</head>
<body>
    <div class="container">
        <h2>📝 Создать аккаунт</h2>

        <div class="success-message" id="successMessage">
            ✅ Регистрация прошла успешно!
        </div>

        <form id="registrationForm" onsubmit="return handleSubmit(event)">
            <div class="name-row">
                <div class="form-group">
                    <label for="firstName">Имя</label>
                    <input type="text" id="firstName" placeholder="Иван" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Фамилия</label>
                    <input type="text" id="lastName" placeholder="Иванов" required>
                </div>
                <div class="form-group">
                    <label for="middleName">Отчество</label>
                    <input type="text" id="middleName" placeholder="Иванович">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
                <div class="error-message" id="emailError">Введите корректный email</div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Минимум 8 символов" required>
                <div class="password-requirements">
                    Требования к паролю:
                    <ul>
                        <li id="lengthRequirement">
                            <span class="requirement-not-met"> </span>
                            <span>Минимум 8 символов</span>
                        </li>
                        <li id="upperRequirement">
                            <span class="requirement-not-met"> </span>
                            <span>Хотя бы одна заглавная буква</span>
                        </li>
                        <li id="numberRequirement">
                            <span class="requirement-not-met"> </span>
                            <span>Хотя бы одна цифра</span>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Повторите пароль</label>
                <input type="password" id="confirmPassword" placeholder="Введите пароль еще раз" required>
                <div class="error-message" id="passwordMatchError">Пароли не совпадают</div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="agreeTerms" required>
                <label for="agreeTerms">Я согласен с <a href="#">условиями использования</a> и <a href="#">политикой конфиденциальности</a></label>
            </div>

            <a href = "submit"> </a><button type="submit">Зарегистрироваться</button></a>
        </form>

        <div class="login-link">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </div>

    </div>
</body>
</html>
